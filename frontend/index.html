<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI GitHub Analyzer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-from: #0a0e1a;
      --bg-mid:  #0d1528;
      --bg-to:   #060b14;
      --accent:  #3b82f6;
      --accent2: #06b6d4;
      --green:   #10b981;
      --yellow:  #f59e0b;
      --red:     #ef4444;
      --glass:   rgba(255,255,255,0.04);
      --border:  rgba(255,255,255,0.08);
      --text:    #e2e8f0;
      --muted:   #64748b;
    }

    html, body {
      min-height: 100%;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      background: var(--bg-from);
    }

    /* ── Animated mesh background ── */
    body {
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(59,130,246,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 60% 50% at 80% 80%, rgba(6,182,212,0.10) 0%, transparent 65%),
        radial-gradient(ellipse 50% 40% at 50% 50%, rgba(16,185,129,0.05) 0%, transparent 60%),
        linear-gradient(160deg, var(--bg-from) 0%, var(--bg-mid) 50%, var(--bg-to) 100%);
      background-attachment: fixed;
    }

    /* ── Noise grain overlay ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* ── Grid dots ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(rgba(255,255,255,0.06) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px 60px;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(59,130,246,0.12);
      border: 1px solid rgba(59,130,246,0.25);
      color: #93c5fd;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 100px;
      margin-bottom: 20px;
    }

    .badge-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #3b82f6;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.8); }
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #fff 30%, #94a3b8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 15px;
      font-weight: 400;
    }

    /* ── Card ── */
    .card {
      width: 100%;
      max-width: 620px;
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px;
      backdrop-filter: blur(20px);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.02),
        0 20px 60px rgba(0,0,0,0.5),
        0 0 80px rgba(59,130,246,0.05);
    }

    /* ── Input group ── */
    .input-label {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
      display: block;
    }

    .input-wrap {
      position: relative;
      margin-bottom: 16px;
    }

    .input-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0.4;
      font-size: 16px;
      pointer-events: none;
    }

    input[type="text"] {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 13.5px;
      padding: 14px 16px 14px 42px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }

    input[type="text"]::placeholder { color: var(--muted); }

    input[type="text"]:focus {
      border-color: rgba(59,130,246,0.5);
      background: rgba(59,130,246,0.04);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
    }

    /* ── Button ── */
    .btn {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 12px;
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.02em;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, #2563eb, #0891b2);
      color: #fff;
      transition: transform 0.18s, box-shadow 0.18s, filter 0.18s;
      box-shadow: 0 4px 20px rgba(37,99,235,0.4), 0 0 40px rgba(37,99,235,0.15);
    }

    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent 60%);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(37,99,235,0.5), 0 0 50px rgba(37,99,235,0.2);
      filter: brightness(1.08);
    }

    .btn:hover::before { opacity: 1; }

    .btn:active:not(:disabled) { transform: translateY(0); }

    .btn:disabled {
      cursor: not-allowed;
      opacity: 0.7;
    }

    .btn-inner {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    /* ── Spinner ── */
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Status / Error ── */
    .status-box {
      display: none;
      margin-top: 20px;
      padding: 14px 16px;
      border-radius: 10px;
      font-size: 13px;
      line-height: 1.6;
    }

    .status-box.error {
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.25);
      color: #fca5a5;
    }

    .status-box.info {
      background: rgba(245,158,11,0.08);
      border: 1px solid rgba(245,158,11,0.25);
      color: #fcd34d;
    }

    .status-box strong { display: block; margin-bottom: 4px; font-weight: 600; }
    .status-box code {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      background: rgba(0,0,0,0.3);
      padding: 2px 6px;
      border-radius: 4px;
    }

    /* ── Result ── */
    .result-card {
      display: none;
      margin-top: 24px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 14px;
      overflow: hidden;
      animation: slideUp 0.4s cubic-bezier(0.16,1,0.3,1) forwards;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      background: rgba(16,185,129,0.05);
    }

    .result-header-icon {
      width: 32px; height: 32px;
      background: rgba(16,185,129,0.15);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }

    .result-header-text {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 15px;
      color: #d1fae5;
    }

    .result-header-sub {
      font-size: 12px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
    }

    .result-body { padding: 20px; }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }

    .stat {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px;
      padding: 14px;
      text-align: center;
    }

    .stat-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .stat-value {
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      word-break: break-word;
    }

    .stat-value.star { color: #fbbf24; }
    .stat-value.lang { color: #67e8f9; }

    .summary-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .summary-text {
      font-size: 14px;
      line-height: 1.7;
      color: #cbd5e1;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 10px;
      padding: 14px 16px;
    }

    /* ── Tips ── */
    .tips {
      margin-top: 28px;
      width: 100%;
      max-width: 620px;
      text-align: center;
    }

    .tips p {
      font-size: 12px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
    }

    .tips a { color: #60a5fa; text-decoration: none; }
    .tips a:hover { text-decoration: underline; }

    @media (max-width: 480px) {
      .card { padding: 24px 18px; }
      .stat-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
<div class="page">

  <div class="header">
    <div class="badge"><span class="badge-dot"></span> AI-Powered Analysis</div>
    <h1>GitHub Repo Analyzer</h1>
    <p class="subtitle">Drop any public repo URL — get an instant AI summary</p>
  </div>

  <div class="card">
    <label class="input-label" for="repoUrl">Repository URL</label>
    <div class="input-wrap">
      <span class="input-icon">⌥</span>
      <input
        type="text"
        id="repoUrl"
        placeholder="https://github.com/owner/repo"
        autocomplete="off"
        spellcheck="false"
      />
    </div>

    <button class="btn" id="analyzeBtn" onclick="analyze()">
      <div class="btn-inner">
        <div class="spinner" id="spinner"></div>
        <span id="btnText">Analyze Repository</span>
      </div>
    </button>

    <!-- Error / info box -->
    <div class="status-box" id="statusBox"></div>

    <!-- Result card -->
    <div class="result-card" id="resultCard">
      <div class="result-header">
        <div class="result-header-icon">✦</div>
        <div>
          <div class="result-header-text" id="repoName">—</div>
          <div class="result-header-sub">Repository Analysis</div>
        </div>
      </div>
      <div class="result-body">
        <div class="stat-grid">
          <div class="stat">
            <div class="stat-label">Language</div>
            <div class="stat-value lang" id="repoLang">—</div>
          </div>
          <div class="stat">
            <div class="stat-label">Stars</div>
            <div class="stat-value star" id="repoStars">—</div>
          </div>
          <div class="stat">
            <div class="stat-label">Status</div>
            <div class="stat-value" style="color:#34d399;font-size:12px;">Analyzed ✓</div>
          </div>
        </div>
        <div class="summary-label">AI Summary</div>
        <div class="summary-text" id="repoSummary">—</div>
      </div>
    </div>
  </div>

  <div class="tips">
    <p>
      Backend must be running at <code style="font-family:'DM Mono',monospace;font-size:11px;background:rgba(255,255,255,0.06);padding:2px 7px;border-radius:4px;">http://127.0.0.1:8000</code>
      &nbsp;·&nbsp; Make sure CORS is enabled in FastAPI
      &nbsp;·&nbsp; <a href="#" onclick="showCORSHelp(event)">Need help?</a>
    </p>
  </div>

</div>

<script>
  const API = "https://ai-github-analyzer.onrender.com/analyze";

  function setLoading(on) {
    const btn = document.getElementById('analyzeBtn');
    const spinner = document.getElementById('spinner');
    const btnText = document.getElementById('btnText');
    btn.disabled = on;
    spinner.style.display = on ? 'block' : 'none';
    btnText.textContent = on ? 'Analyzing…' : 'Analyze Repository';
  }

  function showStatus(msg, type = 'error') {
    const box = document.getElementById('statusBox');
    box.innerHTML = msg;
    box.className = 'status-box ' + type;
    box.style.display = 'block';
  }

  function hideStatus() {
    document.getElementById('statusBox').style.display = 'none';
  }

  function showResult(data) {
    document.getElementById('repoName').textContent   = data.name    || 'Unknown';
    document.getElementById('repoLang').textContent   = data.language || 'N/A';
    document.getElementById('repoStars').textContent  = formatStars(data.stars);
    document.getElementById('repoSummary').textContent = data.summary || 'No summary provided.';
    const card = document.getElementById('resultCard');
    card.style.display = 'block';
    // Re-trigger animation
    card.style.animation = 'none';
    card.offsetHeight; // reflow
    card.style.animation = '';
  }

  function hideResult() {
    document.getElementById('resultCard').style.display = 'none';
  }

  function formatStars(n) {
    if (!n && n !== 0) return '—';
    if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
    return String(n);
  }

  async function analyze() {
    const url = document.getElementById('repoUrl').value.trim();

    // ── Validation ──
    if (!url) {
      showStatus('<strong>No URL entered</strong>Please paste a GitHub repository URL.');
      return;
    }

    // Normalize: strip trailing slash, .git suffix
    const normalized = url.replace(/\.git$/, '').replace(/\/$/, '');

    // Basic pattern check
    const ghPattern = /^https?:\/\/(www\.)?github\.com\/[^\/]+\/[^\/\s]+/i;
    if (!ghPattern.test(normalized)) {
      showStatus(
        '<strong>Invalid GitHub URL</strong>' +
        'Expected format: <code>https://github.com/owner/repo</code><br>' +
        'Got: <code>' + escHtml(url) + '</code>'
      );
      return;
    }

    hideStatus();
    hideResult();
    setLoading(true);

    try {
      const res = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ repo_url: normalized }),
      });

      if (!res.ok) {
        let detail = '';
        try {
          const err = await res.json();
          detail = err.detail || err.message || JSON.stringify(err);
        } catch (_) { detail = res.statusText; }
        showStatus(
          '<strong>Server error ' + res.status + '</strong>' +
          (detail ? escHtml(detail) : 'No details from server.')
        );
        return;
      }

      const data = await res.json();
      showResult(data);

    } catch (err) {
      // Network-level error → most likely CORS or server not running
      const isCORS = err instanceof TypeError && (
        err.message.toLowerCase().includes('fetch') ||
        err.message.toLowerCase().includes('network') ||
        err.message === 'Failed to fetch'
      );

      if (isCORS) {
        showStatus(
          '<strong>⚠ Cannot reach the backend</strong>' +
          'This is usually a <b>CORS</b> issue or your FastAPI server isn\'t running.<br><br>' +
          '1. Make sure FastAPI is running: <code>uvicorn main:app --reload</code><br>' +
          '2. Add CORS middleware to your <code>main.py</code> (click <a href="#" style="color:#fcd34d" onclick="showCORSHelp(event)">Need help?</a>)<br>' +
          '3. Try opening <a href="http://127.0.0.1:8000/docs" target="_blank" style="color:#60a5fa">127.0.0.1:8000/docs</a> to verify the server is live.'
        );
      } else {
        showStatus('<strong>Unexpected error</strong>' + escHtml(err.message));
      }
    } finally {
      setLoading(false);
    }
  }

  function showCORSHelp(e) {
    e.preventDefault();
    showStatus(
      '<strong>How to enable CORS in FastAPI</strong>' +
      'Add this to your <code>main.py</code>:<br><br>' +
      '<code>from fastapi.middleware.cors import CORSMiddleware</code><br>' +
      '<code>app.add_middleware(CORSMiddleware, allow_origins=["*"],<br>' +
      '&nbsp;&nbsp;allow_methods=["*"], allow_headers=["*"])</code>',
      'info'
    );
  }

  function escHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // Allow Enter key
  document.getElementById('repoUrl').addEventListener('keydown', e => {
    if (e.key === 'Enter') analyze();
  });
</script>
</body>
</html>
